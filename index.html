<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi-End Scientific Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #161b26 0%, #070a0f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ตัวเครื่องคิดเลขสไตล์ Luxury & Tech */
        .calculator {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 36px;
            width: 100%;
            max-width: 480px; /* ขยายกว้างขึ้นเล็กน้อยสำหรับปุ่มวิทยาศาสตร์ */
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8),
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        h2 {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 24px;
            text-align: center;
            font-weight: 600;
        }

        /* จอแสดงผลระดับโปร */
        .display-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 32px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: right;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* บรรทัดแสดงสูตรที่เราพิมพ์ */
        .formula-view {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 8px;
            min-height: 1.5rem;
            word-break: break-all;
            letter-spacing: 1px;
        }

        /* บรรทัดแสดงผลลัพธ์ตัวใหญ่ */
        .result-view {
            font-size: 3.2rem;
            font-weight: 200;
            color: #ffffff;
            word-break: break-all;
            line-height: 1.1;
        }

        /* แผงปุ่มกดแบบ 5 คอลัมน์สำหรับเครื่องคิดเลขวิทยาศาสตร์ */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
        }

        button {
            height: 62px;
            border-radius: 18px;
            border: none;
            font-size: 1.2rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* ปุ่มตัวเลข */
        .btn-num {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
        }
        .btn-num:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* ปุ่มฟังก์ชันวิทยาศาสตร์ */
        .btn-sci {
            background: rgba(255, 255, 255, 0.02);
            color: #8fa0bc;
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }
        .btn-sci:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        /* ปุ่มเครื่องหมายพื้นฐาน */
        .btn-op {
            background: rgba(204, 164, 59, 0.1);
            color: #cca43b; /* สีทองลักชัวรี */
            font-size: 1.4rem;
        }
        .btn-op:hover {
            background: #cca43b;
            color: #070a0f;
            box-shadow: 0 0 15px rgba(204, 164, 59, 0.4);
        }

        /* ปุ่มล้างหน้าจอ AC */
        .btn-clear {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            font-size: 1.1rem;
        }
        .btn-clear:hover {
            background: #ef4444;
            color: #ffffff;
        }

        /* ปุ่มเครื่องหมายเท่ากับ = */
        .btn-equal {
            background: #cca43b;
            color: #070a0f;
            font-weight: 600;
            font-size: 1.5rem;
        }
        .btn-equal:hover {
            box-shadow: 0 0 20px rgba(204, 164, 59, 0.6);
            transform: scale(1.02);
        }

        button:active {
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <div class="calculator">
        <h2>Scientific Enterprise</h2>
        
        <div class="display-container">
            <div class="formula-view" id="formula"></div>
            <div class="result-view" id="result">0</div>
        </div>

        <div class="grid">
            <!-- แถวที่ 1: ฟังก์ชันวิทย์ + ล้างสถานะ -->
            <button class="btn-sci" onclick="inputFunc('Math.sin')">sin</button>
            <button class="btn-sci" onclick="inputFunc('Math.cos')">cos</button>
            <button class="btn-sci" onclick="inputFunc('Math.tan')">tan</button>
            <button class="btn-clear" onclick="clearAll()">AC</button>
        </div>

        <div class="grid">
            <!-- แถวที่ 2: ปุ่มตัวเลข  -->
            <button class="btn-num" onclick="inputNum(7)">7</button>
            <button class="btn-num" onclick="inputNum(8)">8</button>
            <button class="btn-num" onclick="inputNum(9)">9</button>
            <button class="btn-op" onclick="inputOp('/')">/</button>
        </div>

        <div class="grid">
            <!-- แถวที่ 3: ปุ่มตัวเลข  -->
            <button class="btn-num" onclick="inputNum(4)">4</button>
            <button class="btn-num" onclick="inputNum(5)">5</button>
            <button class="btn-num" onclick="inputNum(6)">6</button>
            <button class="btn-op" onclick="inputOp('*')">*</button>
        </div>

        <div class="grid">
            <!-- แถวที่ 4: ปุ่มตัวเลข  -->
            <button class="btn-num" onclick="inputNum(1)">1</button>
            <button class="btn-num" onclick="inputNum(2)">2</button>
            <button class="btn-num" onclick="inputNum(3)">3</button>
            <button class="btn-op" onclick="inputOp('-')">-</button>
        </div>

        <div class="grid">
            <!-- แถวที่ 5: ปุ่มตัวเลข  -->
            <button class="btn-num" onclick="inputNum(0)">0</button>
            <button class="btn-equal" onclick="calculateResult()">=</button>
            <button class="btn-op" onclick="inputOp('+')">+</button>
        </div>
    </div>

    <script>
        let formula = '';
        let result = 0;

        function inputNum(num) {
            formula += num;
            document.getElementById('formula').innerText = formula;
        }

        function inputOp(op) {
            formula += ' ' + op + ' ';
            document.getElementById('formula').innerText = formula;
        }

        function inputFunc(func) {
            formula += func + '(';
            document.getElementById('formula').innerText = formula;
        }

        function clearAll() {
            formula = '';
            result = 0;
            document.getElementById('formula').innerText = formula;
            document.getElementById('result').innerText = result;
        }

        function calculateResult() {
            try {
                result = eval(formula);
            } catch (error) {
                result = 'Error';
            }
            document.getElementById('result').innerText = result;
        }
    </script>
</body>
</html>
